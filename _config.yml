title: "DivineHawk"
author: "DivineHawk"
description: "Insights, research, and engineering notes from DivineHawk AI — machine learning, systems, and applied research."

# Email / Social media user names used by the minima theme:
# All of these are optional and can be removed or commented out
#email: "hello@divinehawk.ai"
#twitter_username: ""
github_username: "divinehawk"
#linkedin_username: ""

#########################################################################################
######### Nothing below needs to be changed (unless you know what you're doing) #########
#########################################################################################
theme: "minima"

rss: rss

kramdown:
  syntax_highlighter_opts:
    disable: true
    
plugins:
  - jekyll-feed
  - jekyll-sitemap

titles_from_headings:
  strip_title: true
  collections: true

defaults:
  - scope:
      path: ""
      type: post
    values:
      tags: AI
